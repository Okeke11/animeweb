<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Jujutsu Kaisen | ANIDOM</title>
    <link rel="stylesheet" href="../css/prac.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        .player-section {
            max-width: 1000px;
            margin: 40px auto;
            background-color: var(--surface-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background-color: #000;
        }

        /* The IFrame is the magic window to the other server */
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .download-btn {
            background-color: var(--accent-color);
            color: #000;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 0 15px var(--accent-hover);
        }
    </style>
</head>
<body>

    <header class="topnav">
        <a href="../index.html" style="text-decoration: none;"><h1 class="animekisa">ANIDOM</h1></a>
    </header>

    <main>
        <section class="player-section">
            <h2 id="episode-title" style="color: white; margin-bottom: 15px;">Jujutsu Kaisen - Episode ...</h2>
            
            <div class="video-wrapper">
                <iframe id="anime-player" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0" allowfullscreen></iframe>
            </div>

            <div class="player-controls">
                <a href="jjk.html" style="color: var(--text-main); text-decoration: none;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Episodes
                </a>
                
                <a href="#" class="download-btn">
                    <i class="fa-solid fa-download"></i> Download Episode
                </a>
            </div>
        </section>
    </main>

    <script src="../watch.js"></script>
</body>
</html>
